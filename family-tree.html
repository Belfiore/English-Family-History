<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree | The FitzMaurice &amp; Andrews Heritage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
/* ============================================
   CSS VARIABLES — matching existing site
   ============================================ */
:root {
    --burgundy: #8B0000;
    --burgundy-dark: #4a0000;
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --gold-light: #FFF3B0;
    --cream: #FDF8F0;
    --cream-dark: #F5EDE0;
    --ink: #1a1a2e;
    --ink-light: #2d2d44;
    --parchment: #F8F1E4;
    --sepia: #704214;
    --shadow: rgba(0, 0, 0, 0.15);
    --font-display: 'Cinzel', serif;
    --font-body: 'Cormorant Garamond', serif;
    --font-accent: 'EB Garamond', serif;

    /* Card border colours */
    --border-royal: #c8a97a;
    --border-notable: #2a4a7b;
    --border-photo: #5a3e2a;
    --border-you: #1a5c2a;
    --border-ww2: #8b2020;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--ink);
    line-height: 1.7;
    overflow-x: hidden;
}

/* ============================================
   NAVIGATION
   ============================================ */
.main-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0.5rem 0;
    background: rgba(26, 26, 46, 0.95);
    backdrop-filter: blur(20px);
    box-shadow: 0 2px 30px rgba(0,0,0,0.3);
}

.nav-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.nav-logo {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.1em;
}

.nav-links {
    display: flex;
    gap: 2rem;
}

.nav-links a {
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
}

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s;
}

.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--gold); }
.nav-links a.active::after { width: 100%; }

.nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px;
}
.nav-toggle span {
    width: 25px; height: 2px;
    background: var(--gold);
    transition: all 0.3s;
}

/* ============================================
   PAGE HEADER
   ============================================ */
.page-header {
    padding: 7rem 2rem 2rem;
    background: linear-gradient(135deg, var(--ink) 0%, var(--burgundy-dark) 100%);
    text-align: center;
    position: relative;
    overflow: hidden;
}

.page-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='%23FFD700' stroke-width='0.3' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.5;
}

.page-header-content {
    position: relative;
    z-index: 1;
}

.page-header .section-tag {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 0.4rem 1.5rem;
    margin-bottom: 1.5rem;
}

.page-header h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: white;
    letter-spacing: 0.05em;
    line-height: 1.3;
    margin-bottom: 0.75rem;
}

.page-header .subtitle {
    font-family: var(--font-accent);
    font-size: 1.15rem;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    max-width: 600px;
    margin: 0 auto;
}

.header-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 1.25rem 0;
}
.header-divider::before,
.header-divider::after {
    content: '';
    width: 80px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
}
.header-divider::after {
    background: linear-gradient(to left, transparent, var(--gold));
}
.divider-ornament { color: var(--gold); font-size: 1.2rem; }

/* ============================================
   MAIN TWO-COLUMN LAYOUT
   ============================================ */
.tree-layout {
    display: flex;
    height: calc(100vh - 50px);
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    margin-top: 50px;
}

.tree-column {
    flex: 0 0 63%;
    overflow-y: auto;
    padding: 2rem 2rem 4rem 2rem;
    scroll-behavior: smooth;
}

.bio-column {
    flex: 0 0 37%;
    position: sticky;
    top: 0;
    height: calc(100vh - 50px);
    overflow-y: auto;
    border-left: 1px solid rgba(139, 0, 0, 0.1);
    background: white;
    padding: 0;
}

/* Custom scrollbar */
.tree-column::-webkit-scrollbar,
.bio-column::-webkit-scrollbar {
    width: 6px;
}
.tree-column::-webkit-scrollbar-track,
.bio-column::-webkit-scrollbar-track {
    background: transparent;
}
.tree-column::-webkit-scrollbar-thumb,
.bio-column::-webkit-scrollbar-thumb {
    background: rgba(139,0,0,0.2);
    border-radius: 3px;
}
.tree-column::-webkit-scrollbar-thumb:hover,
.bio-column::-webkit-scrollbar-thumb:hover {
    background: rgba(139,0,0,0.4);
}

/* ============================================
   ERA SECTIONS
   ============================================ */
.era-section {
    margin-bottom: 2.5rem;
    position: relative;
}

.era-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid rgba(139, 0, 0, 0.12);
}

.era-badge {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--burgundy);
    white-space: nowrap;
    background: rgba(139,0,0,0.06);
    padding: 0.35rem 0.9rem;
    border-radius: 3px;
    border: 1px solid rgba(139,0,0,0.12);
}

.era-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: var(--ink);
    letter-spacing: 0.05em;
}

.era-date {
    font-family: var(--font-accent);
    font-size: 0.85rem;
    color: var(--gold-dark);
    font-style: italic;
    margin-left: auto;
    white-space: nowrap;
}

/* ============================================
   PERSON ROW LAYOUTS
   ============================================ */
.person-row {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 0.75rem;
    position: relative;
}

.person-row.couple {
    justify-content: center;
    align-items: center;
}

.marriage-symbol {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0.25rem;
    color: var(--burgundy);
    opacity: 0.5;
    font-size: 1.3rem;
    align-self: center;
}

.dashed-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0.25rem;
    align-self: center;
}

.dashed-connector .dash-line {
    width: 40px;
    border-top: 2px dashed rgba(139,0,0,0.3);
}

.dashed-connector .dash-label {
    font-family: var(--font-accent);
    font-size: 0.65rem;
    color: var(--sepia);
    font-style: italic;
    white-space: nowrap;
    margin-top: 2px;
}

/* Descent arrow between rows */
.descent-arrow {
    display: flex;
    justify-content: center;
    padding: 0.25rem 0;
    color: var(--burgundy);
    opacity: 0.3;
    font-size: 1.1rem;
}

/* ============================================
   PERSON CARD
   ============================================ */
.person-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.6rem 0.5rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    min-width: 110px;
    max-width: 145px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.6);
}

.person-card:hover {
    background: rgba(139, 0, 0, 0.04);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.person-card.selected {
    background: rgba(139, 0, 0, 0.06);
    border-color: var(--burgundy);
    box-shadow: 0 4px 20px rgba(139,0,0,0.12);
}

/* Left border by type */
.person-card[data-type="royal"] { border-left: 3px solid var(--border-royal); }
.person-card[data-type="notable"] { border-left: 3px solid var(--border-notable); }
.person-card[data-type="photo"] { border-left: 3px solid var(--border-photo); }
.person-card[data-type="you"] { border-left: 3px solid var(--border-you); }
.person-card[data-type="ww2"] { border-left: 3px solid var(--border-ww2); }

.person-avatar-ring {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 2px solid rgba(139,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.35rem;
    transition: border-color 0.3s;
}

.person-card:hover .person-avatar-ring,
.person-card.selected .person-avatar-ring {
    border-color: var(--burgundy);
}

.person-card[data-type="royal"] .person-avatar-ring {
    border-color: var(--border-royal);
}

.person-avatar-inner {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
}

.person-avatar-inner.male { background: linear-gradient(135deg, #e8e0d8, #d4c8b8); }
.person-avatar-inner.female { background: linear-gradient(135deg, #f0e0e8, #e4d0d8); }
.person-avatar-inner.group { background: linear-gradient(135deg, #e0e0e8, #d0d0d8); }

.person-card-name {
    font-family: var(--font-display);
    font-size: 0.65rem;
    color: var(--ink);
    text-align: center;
    line-height: 1.3;
    margin-bottom: 0.15rem;
}

.person-card-dates {
    font-family: var(--font-accent);
    font-size: 0.72rem;
    color: var(--sepia);
    font-style: italic;
    opacity: 0.7;
    text-align: center;
}

.person-card-role {
    font-family: var(--font-display);
    font-size: 0.5rem;
    color: var(--gold-dark);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.15rem;
    text-align: center;
    line-height: 1.3;
}

/* Photo indicator dot */
.has-photos-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border-photo);
    box-shadow: 0 0 4px rgba(90,62,42,0.4);
}

/* ============================================
   SPECIAL NOTES IN TREE
   ============================================ */
.tree-note {
    text-align: center;
    padding: 0.5rem 1rem;
    margin: 0.25rem auto 0.75rem;
    max-width: 500px;
}

.tree-note.dashed {
    border: 1px dashed rgba(139,0,0,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
}

.tree-note p {
    font-family: var(--font-accent);
    font-size: 0.85rem;
    color: var(--sepia);
    font-style: italic;
    line-height: 1.5;
}

.tree-note .note-icon {
    font-size: 0.9rem;
    margin-right: 0.3rem;
}

.tree-note.blitz {
    border-color: rgba(139,32,32,0.3);
    background: rgba(139,32,32,0.03);
}

.tree-note.blitz p {
    color: #8b2020;
}

.tree-note.sidebar-link {
    cursor: pointer;
    transition: all 0.25s;
}

.tree-note.sidebar-link:hover {
    background: rgba(139,0,0,0.05);
    border-color: var(--burgundy);
}

/* ============================================
   COUPLE HIGHLIGHT (Patricia & Ronald)
   ============================================ */
.couple-highlight {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem;
    background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(253,248,240,0.8));
    border: 2px solid var(--gold);
    border-radius: 14px;
    box-shadow: 0 6px 30px rgba(139, 0, 0, 0.08);
    margin: 0.5rem auto;
    max-width: 360px;
}

.couple-highlight .wedding-icon {
    text-align: center;
    font-size: 1.5rem;
}

.couple-highlight .wedding-date {
    font-family: var(--font-display);
    font-size: 0.55rem;
    color: var(--gold-dark);
    letter-spacing: 0.1em;
}

/* ============================================
   BIO PANEL (right column)
   ============================================ */
.bio-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 3rem;
    text-align: center;
}

.bio-empty-icon {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    opacity: 0.3;
}

.bio-empty h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--ink);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
}

.bio-empty p {
    font-family: var(--font-accent);
    font-size: 0.95rem;
    color: var(--sepia);
    font-style: italic;
    max-width: 250px;
}

/* Bio content when a person is selected */
.bio-content {
    padding: 1.75rem;
}

.bio-header {
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(139,0,0,0.08);
}

.bio-header h2 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--burgundy);
    letter-spacing: 0.03em;
    line-height: 1.3;
    margin-bottom: 0.35rem;
}

.bio-header .bio-role {
    font-family: var(--font-accent);
    font-size: 0.95rem;
    color: var(--gold-dark);
    font-style: italic;
}

.bio-header .bio-dates {
    font-family: var(--font-accent);
    font-size: 0.88rem;
    color: var(--sepia);
    margin-top: 0.25rem;
}

/* Badges */
.bio-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 1.25rem;
}

.bio-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    white-space: nowrap;
}

.bio-badge.royal { background: #f5efe6; color: #7b5e3a; }
.bio-badge.famous { background: #edf2fa; color: #2a4a7b; }
.bio-badge.photo { background: #f5ede4; color: #5a3e2a; }
.bio-badge.you { background: #eaf3de; color: #1a5c2a; }
.bio-badge.danger { background: #fcebeb; color: #8b2020; }
.bio-badge.military { background: #fff9ea; color: #7a5a00; }
.bio-badge.neutral { background: #f5efe6; color: #9b8570; }

/* Photos in bio panel */
.bio-photos {
    margin-bottom: 1.25rem;
}

.bio-photos-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sepia);
    margin-bottom: 0.5rem;
    opacity: 0.6;
}

.bio-photo-row {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
}

.bio-photo-row::-webkit-scrollbar {
    height: 4px;
}
.bio-photo-row::-webkit-scrollbar-thumb {
    background: rgba(139,0,0,0.15);
    border-radius: 2px;
}

.bio-photo-thumb {
    flex-shrink: 0;
    width: 100px;
    height: 80px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(139,0,0,0.1);
    transition: all 0.25s;
}

.bio-photo-thumb:hover {
    border-color: var(--burgundy);
    box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    transform: translateY(-2px);
}

.bio-photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Bio text sections */
.bio-section {
    margin-bottom: 1rem;
}

.bio-section-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--burgundy);
    margin-bottom: 0.35rem;
    opacity: 0.7;
}

.bio-section p {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--sepia);
    line-height: 1.7;
}

.bio-section p.connection {
    font-family: var(--font-accent);
    font-style: italic;
    color: var(--gold-dark);
}

.bio-section p.notable {
    font-size: 0.88rem;
    opacity: 0.8;
}

/* Sources links */
.bio-sources {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(139,0,0,0.08);
}

.bio-sources-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--burgundy);
    margin-bottom: 0.4rem;
    opacity: 0.7;
}

.bio-sources a {
    display: block;
    font-family: var(--font-accent);
    font-size: 0.82rem;
    color: var(--burgundy);
    text-decoration: none;
    padding: 0.2rem 0;
    transition: color 0.2s;
}

.bio-sources a:hover {
    color: var(--gold-dark);
    text-decoration: underline;
}

.bio-sources a::before {
    content: '\2192  ';
    opacity: 0.5;
}

/* ============================================
   LIGHTBOX
   ============================================ */
.lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 3000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    flex-direction: column;
}

.lightbox-overlay.active {
    opacity: 1;
    pointer-events: all;
}

.lightbox-close {
    position: absolute;
    top: 1.5rem; right: 1.5rem;
    background: none;
    border: none;
    color: white;
    font-size: 2.2rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.3s;
    z-index: 3001;
    line-height: 1;
}

.lightbox-close:hover { opacity: 1; }

.lightbox-image-wrap {
    max-width: 90vw;
    max-height: 80vh;
    position: relative;
}

.lightbox-image-wrap img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 10px 60px rgba(0,0,0,0.5);
}

.lightbox-caption {
    font-family: var(--font-accent);
    font-size: 0.95rem;
    color: rgba(255,255,255,0.8);
    text-align: center;
    max-width: 700px;
    margin-top: 1rem;
    font-style: italic;
    line-height: 1.5;
    padding: 0 1rem;
}

.lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 1.5rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    z-index: 3001;
}

.lightbox-nav:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
}

.lightbox-prev { left: 1.5rem; }
.lightbox-next { right: 1.5rem; }

.lightbox-counter {
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
    margin-top: 0.75rem;
}

/* ============================================
   PERSPECTIVE SELECTOR ("Who Are You?")
   ============================================ */
.perspective-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, rgba(253,248,240,0.9), rgba(255,255,255,0.8));
    border: 1px solid rgba(200,169,122,0.3);
    border-radius: 10px;

function createCard(id) {
  const p = PEOPLE[id];
  if (!p) return document.createElement('div');

  const card = document.createElement('div');
  card.className = 'person-card';
  card.dataset.type = p.type;
  card.dataset.id = id;

  // Check for photos
  const photos = getPhotosForPerson(id);
  const hasPhotos = photos && photos.length > 0;

  card.innerHTML = `
    ${hasPhotos ? '<div class="has-photos-dot"></div>' : ''}
    <div class="person-avatar-ring">
      <div class="person-avatar-inner ${p.gender}">${p.emoji}</div>
    </div>
    <div class="person-card-name">${p.name}</div>
    ${p.dates ? '<div class="person-card-dates">' + p.dates + '</div>' : ''}
    ${p.role && p.type !== 'neutral' ? '<div class="person-card-role">' + truncRole(p.role) + '</div>' : ''}
  `;

  card.addEventListener('click', () => selectPerson(id));
  return card;
}

function truncRole(role) {
  if (role.length > 40) return role.substring(0, 38) + '\u2026';
  return role;
}

function getPhotosForPerson(id) {
  const p = PEOPLE[id];
  if (!p || !p.photoKey) return [];
  return PHOTOS[p.photoKey] || [];
}

// ============================================
// BIO PANEL
// ============================================
let currentPerson = null;

function selectPerson(id) {
  const p = PEOPLE[id];
  if (!p) return;

  currentPerson = id;

  // Update card selection
  document.querySelectorAll('.person-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll(`.person-card[data-id="${id}"]`).forEach(c => c.classList.add('selected'));

  const empty = document.getElementById('bioEmpty');
  const content = document.getElementById('bioContent');
  empty.style.display = 'none';
  content.style.display = 'block';

  const photos = getPhotosForPerson(id);

  // Get perspective-aware role and connection text
  const viewerData = RELATIONSHIPS[currentViewer];
  const rel = viewerData ? viewerData[id] : null;
  const roleText = rel ? rel.role : p.role;
  const connectionText = rel ? rel.connection : p.connection;

  let photosHtml = '';
  if (photos.length > 0) {
    photosHtml = `
      <div class="bio-photos">
        <div class="bio-photos-label">Photographs</div>
        <div class="bio-photo-row">
          ${photos.map((ph, i) => `
            <div class="bio-photo-thumb" data-person="${id}" data-index="${i}">
              <img src="${PHOTO_PATH}${ph.file}" alt="${ph.caption}" loading="lazy">
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // Historical portraits for figures without family photos
  let portraitHtml = '';
  if (photos.length === 0 && HISTORICAL_PORTRAITS[id]) {
    const portraits = HISTORICAL_PORTRAITS[id];
    portraitHtml = portraits.map(portrait => `
      <div class="bio-portrait">
        <img src="${portrait.url}" alt="${portrait.caption}" loading="lazy">
        <div class="bio-portrait-caption">${portrait.caption}</div>
      </div>
    `).join('');
  }

  let badgesHtml = '';
  if (p.badges && p.badges.length > 0) {
    badgesHtml = `
      <div class="bio-badges">
        ${p.badges.map(b => `<span class="bio-badge ${b.style}">${b.text}</span>`).join('')}
      </div>
    `;
  }

  content.innerHTML = `
    <div class="bio-header">
      <h2>${p.name}</h2>
      <div class="bio-role">${roleText}</div>
      ${p.dates ? '<div class="bio-dates">' + p.dates + '</div>' : ''}
    </div>
    ${badgesHtml}
    ${portraitHtml}
    ${photosHtml}
    <div class="bio-section">
      <div class="bio-section-label">About</div>
      <p>${p.about}</p>
    </div>
    <div class="bio-section">
      <div class="bio-section-label">Connection to You</div>
      <p class="connection">${connectionText}</p>
    </div>
    ${p.notable ? `
    <div class="bio-section">
      <div class="bio-section-label">Research Note</div>
      <p class="notable">${p.notable}</p>
    </div>
    ` : ''}
    ${SOURCES[id] ? `
    <div class="bio-sources">
      <div class="bio-sources-label">Read More / Sources</div>
      ${SOURCES[id].map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.text}</a>`).join('')}
    </div>
    ` : ''}
  `;

  // Attach lightbox listeners to photo thumbs
  content.querySelectorAll('.bio-photo-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      const personId = thumb.dataset.person;
      const index = parseInt(thumb.dataset.index, 10);
      openLightbox(personId, index);
    });
  });

  // Scroll bio column to top
  document.getElementById('bioColumn').scrollTop = 0;
}

// ============================================
// LIGHTBOX
// ============================================
let lightboxPhotos = [];
let lightboxIndex = 0;

function openLightbox(personId, index) {
  lightboxPhotos = getPhotosForPerson(personId);
  lightboxIndex = index;
  renderLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function renderLightbox() {
  if (!lightboxPhotos.length) return;
  const photo = lightboxPhotos[lightboxIndex];
  document.getElementById('lightboxImg').src = PHOTO_PATH + photo.file;
  document.getElementById('lightboxImg').alt = photo.caption;
  document.getElementById('lightboxCaption').textContent = photo.caption;
  document.getElementById('lightboxCounter').textContent =
    lightboxPhotos.length > 1 ? (lightboxIndex + 1) + ' / ' + lightboxPhotos.length : '';

  document.getElementById('lightboxPrev').style.display = lightboxPhotos.length > 1 ? 'flex' : 'none';
  document.getElementById('lightboxNext').style.display = lightboxPhotos.length > 1 ? 'flex' : 'none';
}

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
  renderLightbox();
});
document.getElementById('lightboxNext').addEventListener('click', (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
  renderLightbox();
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') {
    lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
    renderLightbox();
  }
  if (e.key === 'ArrowRight') {
    lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
    renderLightbox();
  }
});

// ============================================

document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

document.getElementById('perspectiveSelect').addEventListener('change', function() {
  currentViewer = this.value;
  buildTree();
  if (currentPerson) {
    selectPerson(currentPerson);
